<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>TechShop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0f;
            --card: #13131a;
            --card2: #1a1a24;
            --accent: #7c3aed;
            --accent2: #a855f7;
            --pink: #ec4899;
            --text: #fafafa;
            --text2: #a1a1aa;
            --green: #22c55e;
            --red: #ef4444;
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: 
                radial-gradient(ellipse at 25% 35%, rgba(124,58,237,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 65%, rgba(236,72,153,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.03) 0%, transparent 70%);
            animation: bgFloat 25s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }
        
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(3%, -2%) rotate(1deg); }
            50% { transform: translate(-1%, 3%) rotate(-1deg); }
            75% { transform: translate(-2%, -1%) rotate(0.5deg); }
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 20px;
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .logo {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent2), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1.5px;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 19px;
            position: relative;
            transition: all 0.2s;
        }
        
        .icon-btn:active {
            transform: scale(0.9);
            background: var(--card2);
        }
        
        .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--accent);
            color: white;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            box-shadow: 0 2px 8px rgba(124,58,237,0.4);
        }

        /* SEARCH */
        .search-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 16px;
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 24px rgba(124,58,237,0.12);
        }
        
        .search-input::placeholder { color: #52525b; }
        
        .search-btn {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .search-btn:active {
            transform: scale(0.9);
            opacity: 0.8;
        }

        /* CATEGORIES */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px;
            margin-bottom: 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .categories::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 10px 18px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            color: var(--text2);
        }
        
        .chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(124,58,237,0.3);
        }

        /* PRODUCTS GRID */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .product-card {
            background: var(--card);
            border-radius: 20px;
            padding: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        
        .product-card:active {
            transform: scale(0.95);
            background: var(--card2);
        }
        
        .product-img {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(145deg, #1e1e2e 0%, #16162a 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            margin-bottom: 10px;
            position: relative;
        }
        
        .badge-new {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 3px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-desc {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .product-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .price {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent2);
        }
        
        .btn-add {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .btn-add:active { transform: scale(0.85); }
        .btn-add.in-cart { background: var(--green); }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px 20px 20px;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-handle {
            width: 36px;
            height: 5px;
            background: #3a3a45;
            border-radius: 3px;
            margin: 0 auto 16px;
        }
        
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #25252f;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* CART */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card2);
            border-radius: 16px;
            margin-bottom: 8px;
        }
        
        .cart-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #1e1e2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .cart-info { flex: 1; min-width: 0; }
        .cart-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-price { font-size: 12px; color: var(--accent2); }
        
        .qty-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: #2a2a35;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qty-val { font-weight: 700; width: 18px; text-align: center; font-size: 14px; }

        .btn-primary {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        .btn-primary:active { transform: scale(0.96); opacity: 0.85; }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-top: 1px solid #1e1e2e;
            margin-top: 8px;
        }
        
        .total-label { font-size: 15px; color: var(--text2); }
        
        .total-val {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent2), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }
        
        .empty-icon { font-size: 56px; margin-bottom: 12px; }

        .option-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--card2);
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-card:active { background: #252535; }
        .option-arrow { color: var(--accent2); margin-left: auto; }

        .confirm-box {
            background: var(--card2);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">⚡ TechShop</div>
            <div class="header-actions">
                <div class="icon-btn" onclick="showCart()">
                    🛒
                    <span class="badge" id="cartBadge">0</span>
                </div>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-wrap">
            <input type="text" class="search-input" placeholder="🔍 Поиск товаров..." id="searchInput" oninput="onSearch()">
        </div>

        <!-- CATEGORIES -->
        <div class="categories" id="catList"></div>

        <!-- PRODUCTS -->
        <div class="products-grid" id="productGrid"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
        <div class="modal" id="modalBox"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.MainButton.hide();

        // ===== ДАННЫЕ =====
        const products = [
            { id: 1, name: 'iPhone 15 Pro Max', cat: 'Телефоны', price: 149990, img: '📱', desc: 'A17 Pro • Титановый корпус • 256 ГБ', rating: 4.9, reviews: 567 },
            { id: 2, name: 'Samsung S24 Ultra', cat: 'Телефоны', price: 129990, img: '📲', desc: 'Galaxy AI • 200 МП • S Pen', rating: 4.8, reviews: 423 },
            { id: 3, name: 'MacBook Air 15" M3', cat: 'Ноутбуки', price: 159990, img: '💻', desc: 'M3 • 16 ГБ • 512 ГБ SSD', rating: 4.9, reviews: 312 },
            { id: 4, name: 'MacBook Pro 14" M3', cat: 'Ноутбуки', price: 229990, img: '💻', desc: 'M3 Pro • 36 ГБ • 1 ТБ', rating: 4.9, reviews: 278 },
            { id: 5, name: 'AirPods Pro 2 USB-C', cat: 'Наушники', price: 32990, img: '🎧', desc: 'Шумоподавление • MagSafe', rating: 4.8, reviews: 891 },
            { id: 6, name: 'Sony WH-1000XM5', cat: 'Наушники', price: 37990, img: '🎧', desc: 'Лучший шумодав • 30 ч', rating: 4.7, reviews: 445 },
            { id: 7, name: 'PlayStation 5 Slim', cat: 'Игры', price: 64990, img: '🎮', desc: '1 ТБ SSD • DualSense', rating: 4.9, reviews: 1200 },
            { id: 8, name: 'Nintendo Switch OLED', cat: 'Игры', price: 32990, img: '🕹️', desc: '7" OLED • Портативная', rating: 4.7, reviews: 678 },
            { id: 9, name: 'iPad Pro M4 11"', cat: 'Планшеты', price: 119990, img: '📋', desc: 'M4 • Ultra Retina XDR', rating: 4.8, reviews: 234 },
            { id: 10, name: 'Apple Watch Ultra 2', cat: 'Часы', price: 89990, img: '⌚', desc: 'Титан • 49 мм • Дайвинг', rating: 4.8, reviews: 345 },
        ];

        const categories = ['Все', 'Телефоны', 'Ноутбуки', 'Наушники', 'Игры', 'Планшеты', 'Часы'];
        const metroLines = [
            { name: '🔴 Красная ветка', stations: ['Спортивная', 'Площадь Ленина', 'Заельцовская', 'Красный проспект'] },
            { name: '🟢 Зелёная ветка', stations: ['Парк культуры', 'Октябрьская', 'Речной вокзал', 'Студенческая'] },
        ];
        const timeSlots = ['10:00–12:00', '12:00–14:00', '14:00–16:00', '16:00–18:00', '18:00–20:00'];

        let cart = [];
        let selectedCat = 'Все';
        let searchQ = '';
        let checkoutMetro = '';
        let checkoutTime = '';

        // ===== РЕНДЕР =====
        function renderCats() {
            document.getElementById('catList').innerHTML = categories.map(c =>
                `<div class="chip${c === selectedCat ? ' active' : ''}" onclick="pickCat('${c}')">${c}</div>`
            ).join('');
        }

        function renderProducts() {
            let list = products;
            if (selectedCat !== 'Все') list = list.filter(p => p.cat === selectedCat);
            if (searchQ) {
                const q = searchQ.toLowerCase();
                list = list.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
            }

            const grid = document.getElementById('productGrid');
            if (!list.length) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>Ничего не найдено</p></div>`;
                return;
            }

            grid.innerHTML = list.map(p => {
                const inCart = cart.find(c => c.id === p.id);
                return `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <div class="product-img">
                        ${p.img}
                        <span class="badge-new">NEW</span>
                    </div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-rating">⭐ ${p.rating} · ${p.reviews} отз.</div>
                    <div class="product-bottom">
                        <span class="price">${p.price.toLocaleString()} ₽</span>
                        <button class="btn-add${inCart ? ' in-cart' : ''}" onclick="event.stopPropagation(); addCart(${p.id})">${inCart ? '✓' : '+'}</button>
                    </div>
                </div>`;
            }).join('');

            updateBadge();
        }

        function updateBadge() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartBadge').textContent = count;
        }

        // ===== ДЕЙСТВИЯ =====
        function pickCat(cat) { selectedCat = cat; renderCats(); renderProducts(); tg.HapticFeedback.impactOccurred('light'); }
        function onSearch() { searchQ = document.getElementById('searchInput').value; renderProducts(); }
        function addCart(id) {
            const p = products.find(x => x.id === id);
            const ex = cart.find(x => x.id === id);
            ex ? ex.qty++ : cart.push({...p, qty: 1});
            renderProducts();
            tg.HapticFeedback.notificationOccurred('success');
        }

        // ===== МОДАЛКИ =====
        function openModal(html) {
            document.getElementById('modalBox').innerHTML = html;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            openModal(`
                <div class="modal-handle"></div>
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div style="text-align:center;font-size:90px;margin:16px 0;">${p.img}</div>
                <h2 style="font-size:20px;margin-bottom:6px;">${p.name}</h2>
                <p style="color:#a1a1aa;margin-bottom:12px;">${p.desc}</p>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
                    <span style="background:#1e1e2e;padding:6px 12px;border-radius:8px;font-size:12px;">⭐ ${p.rating}</span>
                    <span style="background:#1e1e2e;padding:6px 12px;border-radius:8px;font-size:12px;">📝 ${p.reviews} отзывов</span>
                    <span style="background:#1e1e2e;padding:6px 12px;border-radius:8px;font-size:12px;">📦 В наличии</span>
                </div>
                <div style="font-size:26px;font-weight:800;color:#a855f7;margin-bottom:16px;">${p.price.toLocaleString()} ₽</div>
                <button class="btn-primary" onclick="addCart(${p.id});closeModal();">🛒 Добавить в корзину</button>
            `);
        }

        function showCart() {
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let html = `<div class="modal-handle"></div><button class="modal-close" onclick="closeModal()">✕</button><div class="modal-title">🛒 Корзина</div>`;

            if (!cart.length) {
                html += `<div class="empty-state"><div class="empty-icon">🛒</div><p>Корзина пуста</p></div>`;
            } else {
                html += cart.map(i => `
                    <div class="cart-item">
                        <div class="cart-img">${i.img}</div>
                        <div class="cart-info"><div class="cart-name">${i.name}</div><div class="cart-price">${i.price.toLocaleString()} ₽</div></div>
                        <div class="qty-group">
                            <button class="qty-btn" onclick="chQty(${i.id},-1)">−</button>
                            <span class="qty-val">${i.qty}</span>
                            <button class="qty-btn" onclick="chQty(${i.id},1)">+</button>
                        </div>
                    </div>`).join('');
                html += `
                    <div class="total-row"><span class="total-label">Итого:</span><span class="total-val">${total.toLocaleString()} ₽</span></div>
                    <button class="btn-primary" onclick="stepMetro()">📋 Оформить заказ</button>
                    <button class="btn-secondary" onclick="cart=[];closeModal();renderProducts();">🗑 Очистить корзину</button>`;
            }
            openModal(html);
        }

        function chQty(id, d) {
            const item = cart.find(x => x.id === id);
            if (!item) return;
            item.qty += d;
            if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
            showCart();
            renderProducts();
            tg.HapticFeedback.impactOccurred('light');
        }

        function stepMetro() {
            let html = `<div class="modal-handle"></div><button class="modal-close" onclick="closeModal()">✕</button><div class="modal-title">📍 Выберите станцию метро</div>`;
            metroLines.forEach(line => {
                html += `<p style="color:#a855f7;font-weight:600;margin:10px 0 6px;">${line.name}</p>`;
                line.stations.forEach(s => {
                    html += `<div class="option-card" onclick="pickMetro('${s}')"><span>🚇 ${s}</span><span class="option-arrow">→</span></div>`;
                });
            });
            openModal(html);
        }

        function pickMetro(station) {
            checkoutMetro = station;
            const d = new Date();
            d.setDate(d.getDate() + 1);
            const dateStr = d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' });

            let html = `<div class="modal-handle"></div><button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">🕐 Выберите время</div>
                <p style="color:#a1a1aa;margin-bottom:10px;">📍 ${station} · 📅 ${dateStr}</p>`;
            timeSlots.forEach(t => {
                html += `<div class="option-card" onclick="pickTime('${t}')"><span>🕐 ${t}</span><span class="option-arrow">→</span></div>`;
            });
            openModal(html);
        }

        function pickTime(time) {
            checkoutTime = time;
            const d = new Date();
            d.setDate(d.getDate() + 1);
            const dateStr = d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' });
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const count = cart.reduce((s, i) => s + i.qty, 0);

            openModal(`
                <div class="modal-handle"></div>
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">✅ Подтверждение</div>
                <div class="confirm-box">
                    <p>📍 <b>Метро:</b> ${checkoutMetro}</p>
                    <p>📅 <b>Дата:</b> ${dateStr}</p>
                    <p>🕐 <b>Время:</b> ${checkoutTime}</p>
                    <p>📦 <b>Товаров:</b> ${count} шт.</p>
                    <p style="font-size:18px;font-weight:700;color:#a855f7;margin-top:8px;">💰 ${total.toLocaleString()} ₽</p>
                </div>
                <button class="btn-primary" onclick="sendOrder()">✅ Подтвердить заказ</button>
                <button class="btn-secondary" onclick="stepMetro()">← Изменить метро</button>
            `);
        }

        function sendOrder() {
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            tg.sendData(JSON.stringify({
                action: 'new_order',
                items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
                total: total,
                metro: checkoutMetro,
                time: checkoutTime
            }));
            cart = [];
            tg.close();
        }

        // ===== СТАРТ =====
        renderCats();
        renderProducts();
    </script>
</body>
</html>
