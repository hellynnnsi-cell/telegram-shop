<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Helgirll Test</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131a;
            --card2: #1a1a24;
            --accent: #7c3aed;
            --accent2: #a855f7;
            --pink: #ec4899;
            --text: #fafafa;
            --text2: #a1a1aa;
            --green: #22c55e;
            --red: #ef4444;
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.06);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: '';
            position: fixed;
            top: -60%; left: -60%;
            width: 220%; height: 220%;
            background: radial-gradient(ellipse at 25% 30%, rgba(124,58,237,0.04) 0%, transparent 55%),
                        radial-gradient(ellipse at 75% 70%, rgba(236,72,153,0.03) 0%, transparent 55%);
            animation: bgFloat 30s ease-in-out infinite;
            z-index: 0; pointer-events: none;
        }
        @keyframes bgFloat {
            0%,100%{transform:translate(0,0) rotate(0deg)}
            25%{transform:translate(2%,-1%) rotate(0.5deg)}
            50%{transform:translate(-1%,2%) rotate(-0.5deg)}
            75%{transform:translate(-2%,-0.5%) rotate(0.3deg)}
        }
        .app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:12px 14px 120px; }

        /* HEADER */
        .header {
            display:flex; align-items:center; justify-content:space-between;
            padding:6px 0 16px; position:sticky; top:0; z-index:50;
            background:rgba(10,10,15,0.75); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
        }
        .logo { font-size:22px; font-weight:900; color:var(--text); letter-spacing:-1px; }
        .header-actions { display:flex; gap:8px; }
        .icon-btn {
            width:42px; height:42px; border-radius:13px; background:var(--card);
            border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:18px; position:relative; transition:all 0.2s; color:var(--text);
        }
        .icon-btn:active { transform:scale(0.9); background:var(--card2); }
        .badge {
            position:absolute; top:-6px; right:-6px; background:var(--accent); color:white;
            min-width:20px; height:20px; border-radius:10px; font-size:11px; font-weight:700;
            display:flex; align-items:center; justify-content:center; padding:0 5px;
            box-shadow:0 2px 8px rgba(124,58,237,0.5);
        }
        .admin-badge { position:absolute; top:-6px; right:-6px; font-size:10px; }

        /* NAV TABS */
        .nav-tabs {
            display:flex; gap:4px; background:var(--card2); border-radius:12px;
            padding:4px; margin-bottom:14px; position:sticky; top:62px; z-index:40;
        }
        .nav-tab {
            flex:1; padding:9px 6px; border-radius:9px; text-align:center;
            font-size:12px; cursor:pointer; transition:all 0.2s; color:var(--text2); font-weight:500;
        }
        .nav-tab.active { background:var(--accent); color:white; font-weight:600; }

        /* SEARCH */
        .search-wrap { display:flex; gap:8px; margin-bottom:14px; }
        .search-input {
            flex:1; padding:13px 16px; border-radius:var(--radius); background:var(--card);
            border:2px solid var(--border); color:var(--text); font-size:15px; outline:none; transition:all 0.3s;
        }
        .search-input:focus { border-color:var(--accent); box-shadow:0 0 20px rgba(124,58,237,0.1); }
        .search-input::placeholder { color:#52525b; }

        /* CATEGORIES */
        .categories {
            display:flex; gap:8px; overflow-x:auto; padding:2px 0 14px; margin-bottom:6px;
            scrollbar-width:none; -ms-overflow-style:none;
        }
        .categories::-webkit-scrollbar { display:none; }
        .chip {
            padding:9px 17px; border-radius:12px; background:var(--card); border:1px solid var(--border);
            white-space:nowrap; font-size:13px; font-weight:500; cursor:pointer;
            transition:all 0.25s; color:var(--text2); flex-shrink:0;
        }
        .chip.active { background:var(--accent); border-color:var(--accent); color:white; font-weight:600; box-shadow:0 4px 16px rgba(124,58,237,0.35); }

        /* PRODUCT GRID */
        .products-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
        .product-card {
            background:var(--card); border-radius:18px; padding:13px; border:1px solid var(--border);
            cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden;
        }
        .product-card:active { transform:scale(0.95); background:var(--card2); }
        .product-img {
            width:100%; aspect-ratio:1; background:linear-gradient(145deg, #1e1e2e 0%, #16162a 100%);
            border-radius:14px; display:flex; align-items:center; justify-content:center;
            font-size:48px; margin-bottom:10px; position:relative;
        }
        .badge-new {
            position:absolute; top:8px; left:8px; background:var(--accent); color:white;
            padding:4px 10px; border-radius:8px; font-size:10px; font-weight:700;
        }
        .product-name { font-size:13px; font-weight:600; margin-bottom:3px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .product-desc { font-size:11px; color:var(--text2); margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .product-bottom { display:flex; align-items:center; justify-content:space-between; }
        .price { font-size:15px; font-weight:700; color:var(--accent2); }
        .btn-add {
            width:32px; height:32px; border-radius:var(--radius-sm);
            background:linear-gradient(135deg, var(--accent), var(--accent2));
            border:none; color:white; font-size:18px; cursor:pointer; transition:all 0.2s;
            display:flex; align-items:center; justify-content:center; flex-shrink:0;
        }
        .btn-add:active { transform:scale(0.85); }
        .btn-add.in-cart { background:var(--green); }

        /* MODAL */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200;
            display:flex; align-items:flex-end; justify-content:center; animation:fadeIn 0.2s;
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .modal {
            background:var(--card); border-radius:22px 22px 0 0; width:100%; max-width:480px;
            max-height:85dvh; overflow-y:auto; padding:24px 18px 18px; position:relative;
            animation:slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .modal-handle { width:36px; height:5px; background:#3a3a45; border-radius:3px; margin:0 auto 16px; }
        .modal-close {
            position:absolute; top:14px; right:14px; width:32px; height:32px;
            border-radius:50%; background:#25252f; border:none; color:white; font-size:14px;
            cursor:pointer; z-index:10; display:flex; align-items:center; justify-content:center;
        }
        .modal-title { font-size:19px; font-weight:700; margin-bottom:16px; }

        /* CART ITEM */
        .cart-item {
            display:flex; align-items:center; gap:12px; padding:12px;
            background:var(--card2); border-radius:14px; margin-bottom:8px;
        }
        .cart-img {
            width:46px; height:46px; border-radius:11px; background:#1e1e2e;
            display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;
        }
        .cart-info { flex:1; min-width:0; }
        .cart-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .cart-price { font-size:12px; color:var(--accent2); }
        .qty-group { display:flex; align-items:center; gap:6px; }
        .qty-btn {
            width:28px; height:28px; border-radius:8px; background:#2a2a35; border:none;
            color:white; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .qty-btn:active { background:#3a3a45; }
        .qty-val { font-weight:700; width:18px; text-align:center; font-size:14px; }

        /* BUTTONS */
        .btn-primary {
            width:100%; padding:15px; border-radius:var(--radius);
            background:linear-gradient(135deg, var(--accent), var(--accent2));
            border:none; color:white; font-size:15px; font-weight:700; cursor:pointer;
            transition:all 0.2s; margin-top:8px;
        }
        .btn-primary:active { transform:scale(0.96); opacity:0.85; }
        .btn-secondary {
            width:100%; padding:13px; border-radius:var(--radius); background:var(--card2);
            border:1px solid var(--border); color:var(--text); font-size:14px; cursor:pointer; margin-top:8px;
        }
        .btn-danger { background:var(--red) !important; }
        .total-row {
            display:flex; justify-content:space-between; align-items:center;
            padding:16px 0; border-top:1px solid #1e1e2e; margin-top:8px;
        }
        .total-label { font-size:15px; color:var(--text2); }
        .total-val {
            font-size:22px; font-weight:800;
            background:linear-gradient(135deg, var(--accent2), var(--pink));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .empty-state { text-align:center; padding:40px 20px; color:var(--text2); grid-column:1/-1; }
        .empty-icon { font-size:56px; margin-bottom:12px; }
        .option-card {
            display:flex; align-items:center; gap:12px; padding:14px; background:var(--card2);
            border-radius:14px; margin-bottom:8px; cursor:pointer; transition:all 0.2s;
        }
        .option-card:active { background:#252535; }
        .option-arrow { color:var(--accent2); margin-left:auto; font-size:18px; }
        .option-card.disabled { opacity:0.4; pointer-events:none; }
        .confirm-box {
            background:var(--card2); padding:16px; border-radius:14px;
            margin-bottom:12px; line-height:1.9; font-size:14px;
        }
        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            background:var(--green); color:white; padding:10px 24px; border-radius:30px;
            font-weight:600; font-size:14px; z-index:999;
            animation:toastIn 0.3s ease-out, toastOut 0.3s 1.7s ease-in forwards;
        }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
        @keyframes toastOut { from{opacity:1} to{opacity:0} }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:#2a2a35; border-radius:2px; }

        /* STATUS */
        .status-pending { color:#f59e0b; }
        .status-confirmed { color:#22c55e; }
        .status-cancelled { color:#ef4444; }
        .status-completed { color:#a855f7; }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">Helgirll Test</div>
            <div class="header-actions">
                <div class="icon-btn" onclick="showCart()" id="cartBtn">
                    🛒
                    <span class="badge" id="cartBadge">0</span>
                </div>
                <div class="icon-btn" onclick="showProfile()">
                    👤
                </div>
                <div class="icon-btn" id="adminBtn" style="display:none" onclick="showAdmin()">
                    ⚙️
                </div>
            </div>
        </div>

        <!-- NAV TABS -->
        <div class="nav-tabs" id="navTabs">
            <div class="nav-tab active" onclick="switchTab('catalog')">🛍️ Каталог</div>
            <div class="nav-tab" onclick="switchTab('cart')">🛒 Корзина <span id="navCartCount"></span></div>
            <div class="nav-tab" onclick="switchTab('profile')">👤 Профиль</div>
            <div class="nav-tab" id="navAdmin" style="display:none" onclick="switchTab('admin')">⚙️ Админ</div>
        </div>

        <!-- CONTENT AREA -->
        <div id="contentArea"></div>
    </div>

    <div id="toastContainer"></div>
    <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
        <div class="modal" id="modalBox"></div>
    </div>

    <script>
        // ============ TELEGRAM INIT ============
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.MainButton.hide();
        tg.enableClosingConfirmation();

        const user = tg.initDataUnsafe?.user || {};
        const isAdmin = user.username === 'helgirll';

        // ============ ДАННЫЕ ============
        let products = [];
        let categories = [];
        let cart = [];
        let selectedCat = 'Все';
        let searchQ = '';
        let currentTab = 'catalog';
        let orders = [];
        let reviews = [];
        let metroStations = [];
        let timeSlots = [
            { id:1, time_range:'10:00 – 12:00', is_available:true },
            { id:2, time_range:'12:00 – 14:00', is_available:true },
            { id:3, time_range:'14:00 – 16:00', is_available:true },
            { id:4, time_range:'16:00 – 18:00', is_available:true },
            { id:5, time_range:'18:00 – 20:00', is_available:true },
        ];

        // Станции метро СПб
        const defaultMetro = [
            { line:'Кировско-Выборгская', color:'#D32F2F', stations:['Девяткино','Гражданский проспект','Академическая','Политехническая','Площадь Мужества','Лесная','Выборгская','Площадь Ленина','Чернышевская','Площадь Восстания','Владимирская','Пушкинская','Технологический институт','Балтийская','Нарвская','Кировский завод','Автово','Ленинский проспект','Проспект Ветеранов'] },
            { line:'Московско-Петроградская', color:'#1976D2', stations:['Парнас','Проспект Просвещения','Озерки','Удельная','Пионерская','Чёрная речка','Петроградская','Горьковская','Невский проспект','Сенная площадь','Технологический институт','Фрунзенская','Московские ворота','Электросила','Парк Победы','Московская','Звёздная','Купчино'] },
            { line:'Невско-Василеостровская', color:'#388E3C', stations:['Беговая','Зенит','Приморская','Василеостровская','Гостиный двор','Маяковская','Площадь Александра Невского','Елизаровская','Ломоносовская','Пролетарская','Обухово','Рыбацкое'] },
            { line:'Правобережная', color:'#F57C00', stations:['Спасская','Достоевская','Лиговский проспект','Площадь Александра Невского','Новочеркасская','Ладожская','Проспект Большевиков','Улица Дыбенко'] },
            { line:'Фрунзенско-Приморская', color:'#7B1FA2', stations:['Комендантский проспект','Старая Деревня','Крестовский остров','Чкаловская','Спортивная','Адмиралтейская','Садовая','Звенигородская','Обводный канал','Волковская','Бухарестская','Международная','Проспект Славы','Дунайская','Шушары'] },
        ];

        // Загружаем из localStorage
        function loadData() {
            try {
                const saved = localStorage.getItem('hg_shop');
                if (saved) {
                    const data = JSON.parse(saved);
                    products = data.products || [];
                    categories = data.categories || [];
                    cart = data.cart || [];
                    orders = data.orders || [];
                    metroStations = data.metroStations || defaultMetro;
                    timeSlots = data.timeSlots || timeSlots;
                    reviews = data.reviews || [];
                } else {
                    // Инициализация
                    categories = [
                        { id:1, name:'Телефоны', is_active:true },
                        { id:2, name:'Ноутбуки', is_active:true },
                        { id:3, name:'Наушники', is_active:true },
                        { id:4, name:'Игры', is_active:true },
                        { id:5, name:'Планшеты', is_active:true },
                        { id:6, name:'Часы', is_active:true },
                        { id:7, name:'Техника', is_active:true },
                    ];
                    metroStations = defaultMetro;
                    saveData();
                }
            } catch(e) {
                categories = [
                    { id:1, name:'Телефоны', is_active:true },
                    { id:2, name:'Ноутбуки', is_active:true },
                    { id:3, name:'Наушники', is_active:true },
                    { id:4, name:'Игры', is_active:true },
                ];
                metroStations = defaultMetro;
            }
        }

        function saveData() {
            try {
                localStorage.setItem('hg_shop', JSON.stringify({
                    products, categories, cart, orders, metroStations, timeSlots, reviews
                }));
            } catch(e) {}
        }

        // ============ ADMIN CHECK ============
        function checkAdmin() {
            if (isAdmin) {
                document.getElementById('adminBtn').style.display = 'flex';
                document.getElementById('navAdmin').style.display = 'block';
            }
        }

        // ============ TABS ============
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.nav-tab[onclick="switchTab('${tab}')"]`)?.classList.add('active');
            renderContent();
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            switch(currentTab) {
                case 'catalog': renderCatalog(area); break;
                case 'cart': renderCartPage(area); break;
                case 'profile': renderProfile(area); break;
                case 'admin': renderAdmin(area); break;
            }
            updateNavCartCount();
        }

        function updateNavCartCount() {
            const count = cart.reduce((s,i) => s + i.qty, 0);
            document.getElementById('cartBadge').textContent = count;
            const nc = document.getElementById('navCartCount');
            if (nc) nc.textContent = count > 0 ? `(${count})` : '';
        }

        // ============ CATALOG ============
        function renderCatalog(area) {
            const activeCats = categories.filter(c => c.is_active !== false);
            const allCatNames = ['Все', ...activeCats.map(c => c.name)];

            let html = `
                <div class="search-wrap">
                    <input type="text" class="search-input" placeholder="🔍 Поиск товаров..." value="${searchQ}" oninput="searchQ=this.value;renderContent()">
                </div>
                <div class="categories">
                    ${allCatNames.map(c => `<div class="chip${c === selectedCat ? ' active' : ''}" onclick="selectedCat='${c}';renderContent()">${c}</div>`).join('')}
                </div>
                <div class="products-grid">
            `;

            let list = products.filter(p => p.is_available !== false);
            if (selectedCat !== 'Все') list = list.filter(p => {
                const cat = categories.find(c => c.id === p.category_id);
                return cat && cat.name === selectedCat;
            });
            if (searchQ) {
                const q = searchQ.toLowerCase();
                list = list.filter(p => p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q));
            }

            if (!list.length) {
                html += `<div class="empty-state"><div class="empty-icon">📦</div><p>Нет товаров</p></div>`;
            } else {
                list.forEach(p => {
                    const inCart = cart.find(c => c.id === p.id);
                    html += `
                        <div class="product-card" onclick="openProduct(${p.id})">
                            <div class="product-img">
                                ${p.image || '📦'}
                                ${p.stock_quantity > 0 ? '<span class="badge-new">NEW</span>' : '<span class="badge-new" style="background:#ef4444;">Нет</span>'}
                            </div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-desc">${p.description || ''}</div>
                            <div class="product-bottom">
                                <span class="price">${(p.price||0).toLocaleString('ru-RU')} ₽</span>
                                <button class="btn-add${inCart ? ' in-cart' : ''}" onclick="event.stopPropagation(); addToCart(${p.id})">${inCart ? '✓' : '+'}</button>
                            </div>
                        </div>`;
                });
            }
            html += '</div>';
            area.innerHTML = html;
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if (!p || p.stock_quantity < 1) { showToast('Нет в наличии'); return; }
            const ex = cart.find(x => x.id === id);
            if (ex) { if (ex.qty < p.stock_quantity) ex.qty++; }
            else { cart.push({...p, qty:1}); }
            saveData();
            renderContent();
            showToast('Добавлено в корзину');
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            openModal(`
                <div class="modal-handle"></div>
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div style="text-align:center;font-size:80px;margin:12px 0;">${p.image || '📦'}</div>
                <h2 style="font-size:20px;margin-bottom:4px;">${p.name}</h2>
                <p style="color:#a1a1aa;margin-bottom:12px;">${p.description || ''}</p>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
                    <span style="background:#1e1e2e;padding:6px 12px;border-radius:8px;font-size:12px;">📦 ${p.stock_quantity > 0 ? p.stock_quantity + ' шт.' : 'Нет'}</span>
                </div>
                <div style="font-size:26px;font-weight:800;color:#a855f7;margin-bottom:16px;">${(p.price||0).toLocaleString('ru-RU')} ₽</div>
                ${p.stock_quantity > 0 ? `<button class="btn-primary" onclick="addToCart(${p.id});closeModal();">🛒 Добавить в корзину</button>` : '<button class="btn-primary" style="background:#3a3a3a;" disabled>Нет в наличии</button>'}
            `);
        }

        // ============ CART PAGE ============
        function renderCartPage(area) {
            const total = cart.reduce((s,i) => s + (i.price||0)*i.qty, 0);
            let html = '<h3 style="margin-bottom:12px;">🛒 Корзина</h3>';
            if (!cart.length) {
                html += '<div class="empty-state"><div class="empty-icon">🛒</div><p>Корзина пуста</p></div>';
            } else {
                html += cart.map(i => `
                    <div class="cart-item">
                        <div class="cart-img">${i.image || '📦'}</div>
                        <div class="cart-info">
                            <div class="cart-name">${i.name}</div>
                            <div class="cart-price">${((i.price||0)*i.qty).toLocaleString('ru-RU')} ₽</div>
                        </div>
                        <div class="qty-group">
                            <button class="qty-btn" onclick="chQty(${i.id},-1)">−</button>
                            <span class="qty-val">${i.qty}</span>
                            <button class="qty-btn" onclick="chQty(${i.id},1)">+</button>
                        </div>
                    </div>`).join('');
                html += `
                    <div class="total-row"><span class="total-label">Итого:</span><span class="total-val">${total.toLocaleString('ru-RU')} ₽</span></div>
                    <button class="btn-primary" onclick="startCheckout()">📋 Оформить заказ</button>
                    <button class="btn-secondary" onclick="cart=[];saveData();renderContent();showToast('Корзина очищена')">🗑 Очистить</button>`;
            }
            area.innerHTML = html;
        }

        function chQty(id, d) {
            const item = cart.find(x => x.id === id);
            if (!item) return;
            item.qty += d;
            if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
            if (item.qty > (item.stock_quantity || 99)) item.qty = item.stock_quantity;
            saveData();
            renderContent();
        }

        function showCart() { switchTab('cart'); }
        function showProfile() { switchTab('profile'); }
        function showAdmin() { if(isAdmin) switchTab('admin'); }

        // ============ CHECKOUT ============
        let checkoutMetro = '';
        let checkoutTime = '';

        function startCheckout() {
            if (!cart.length) { showToast('Корзина пуста'); return; }
            openModal(renderMetroModal());
        }

        function renderMetroModal() {
            let html = `<div class="modal-handle"></div><button class="modal-close" onclick="closeModal()">✕</button><div class="modal-title">📍 Выберите метро (СПб)</div>`;
            const lines = {};
            metroStations.forEach(m => {
                if (!lines[m.line]) lines[m.line] = { color:m.color, stations:[] };
                lines[m.line].stations.push(m);
            });
            for (const [line, data] of Object.entries(lines)) {
                html += `<p style="color:${data.color};font-weight:600;margin:10px 0 6px;">● ${line}</p>`;
                data.stations.forEach(s => {
                    const cls = s.is_available === false ? 'option-card disabled' : 'option-card';
                    html += `<div class="${cls}" onclick="${s.is_available !== false ? `pickMetro('${s.station}')` : ''}"><span>🚇 ${s.station}</span>${s.is_available !== false ? '<span class="option-arrow">→</span>' : '<span style="color:#ef4444;">недоступна</span>'}</div>`;
                });
            }
            return html;
        }

        function pickMetro(station) {
            checkoutMetro = station;
            const availableSlots = timeSlots.filter(t => t.is_available !== false);
            let html = `<div class="modal-handle"></div><button class="modal-close" onclick="closeModal()">✕</button><div class="modal-title">🕐 Выберите время</div><p style="color:#a1a1aa;margin-bottom:12px;">📍 ${station}</p>`;
            availableSlots.forEach(t => {
                html += `<div class="option-card" onclick="pickTime('${t.time_range}')"><span>🕐 ${t.time_range}</span><span class="option-arrow">→</span></div>`;
            });
            html += `<button class="btn-secondary" onclick="openModal(renderMetroModal())">← Назад</button>`;
            openModal(html);
        }

        function pickTime(time) {
            checkoutTime = time;
            const total = cart.reduce((s,i) => s + (i.price||0)*i.qty, 0);
            const count = cart.reduce((s,i) => s + i.qty, 0);
            const itemsList = cart.map(i => `<div style="display:flex;justify-content:space-between;font-size:13px;"><span>${i.name} x${i.qty}</span><span>${((i.price||0)*i.qty).toLocaleString('ru-RU')} ₽</span></div>`).join('');
            openModal(`
                <div class="modal-handle"></div><button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">✅ Подтверждение</div>
                <div class="confirm-box">
                    <p>📍 <b>Метро:</b> ${checkoutMetro}</p>
                    <p>🕐 <b>Время:</b> ${checkoutTime}</p>
                    <p>📦 <b>Товаров:</b> ${count} шт.</p>
                    <div style="border-top:1px solid #2a2a35;padding-top:10px;margin-bottom:8px;">${itemsList}</div>
                    <p style="font-size:18px;font-weight:700;color:#a855f7;">💰 ${total.toLocaleString('ru-RU')} ₽</p>
                </div>
                <button class="btn-primary" onclick="sendOrder()">✅ Подтвердить заказ</button>
                <button class="btn-secondary" onclick="pickMetro('${checkoutMetro}')">← Назад</button>
            `);
        }

        function sendOrder() {
            const total = cart.reduce((s,i) => s + (i.price||0)*i.qty, 0);
            const newOrder = {
                id: Date.now(),
                items: [...cart],
                total: total,
                metro: checkoutMetro,
                time: checkoutTime,
                status: 'pending',
                can_edit: false,
                date: new Date().toISOString(),
            };
            orders.unshift(newOrder);
            cart = [];
            saveData();
            closeModal();
            showToast('Заказ оформлен!');
            tg.sendData(JSON.stringify({
                action: 'new_order',
                order: newOrder,
                items: newOrder.items.map(i => ({id:i.id, name:i.name, price:i.price, qty:i.qty})),
                total: total,
                metro: checkoutMetro,
                time: checkoutTime,
            }));
            renderContent();
        }

        // ============ PROFILE ============
        function renderProfile(area) {
            let html = `<h3 style="margin-bottom:12px;">👤 Профиль</h3>`;
            html += `<div class="confirm-box"><p>👤 <b>${user.first_name || 'Пользователь'}</b></p><p>📎 @${user.username || 'нет'}</p><p>📅 Заказов: ${orders.length}</p></div>`;
            html += `<h4 style="margin:16px 0 8px;">📋 Мои заказы</h4>`;
            if (!orders.length) {
                html += '<p style="color:var(--text2);">Нет заказов</p>';
            } else {
                orders.forEach(o => {
                    const statusMap = {pending:'⏳ Ожидает', confirmed:'✅ Подтверждён', completed:'🎉 Выполнен', cancelled:'❌ Отменён'};
                    const itemsText = (o.items||[]).map(i => `${i.name} x${i.qty}`).join(', ');
                    html += `<div class="option-card" style="flex-direction:column;align-items:flex-start;">
                        <div style="display:flex;justify-content:space-between;width:100%;">
                            <b>Заказ #${o.id.toString().slice(-6)}</b>
                            <span class="status-${o.status}">${statusMap[o.status] || o.status}</span>
                        </div>
                        <p style="font-size:12px;color:var(--text2);">${itemsText}</p>
                        <p style="font-size:12px;">💰 ${(o.total||0).toLocaleString('ru-RU')} ₽ | 📍 ${o.metro||'—'}</p>
                        ${o.can_edit && o.status === 'pending' ? `<button class="btn-secondary" style="margin-top:8px;" onclick="cancelOrder(${o.id})">❌ Отменить заказ</button>` : ''}
                    </div>`;
                });
            }
            area.innerHTML = html;
        }

        function cancelOrder(id) {
            const order = orders.find(o => o.id === id);
            if (order && order.can_edit) {
                order.status = 'cancelled';
                saveData();
                showToast('Заказ отменён');
                renderContent();
                tg.sendData(JSON.stringify({action:'cancel_order', order_id:id}));
            }
        }

        // ============ ADMIN PANEL ============
        function renderAdmin(area) {
            if (!isAdmin) { area.innerHTML = '<p>⛔ Нет доступа</p>'; return; }
            let html = `<h3 style="margin-bottom:12px;">⚙️ Админ-панель</h3>`;

            // Управление заказами
            html += `<h4 style="margin:12px 0 8px;">📋 Заказы</h4>`;
            if (!orders.length) html += '<p style="color:var(--text2);">Нет заказов</p>';
            else {
                orders.forEach(o => {
                    const statusMap = {pending:'⏳ Ожидает', confirmed:'✅ Подтверждён', completed:'🎉 Выполнен', cancelled:'❌ Отменён'};
                    html += `<div class="option-card" style="flex-direction:column;align-items:flex-start;">
                        <b>#${o.id.toString().slice(-6)}</b> | ${(o.total||0).toLocaleString('ru-RU')} ₽ | ${statusMap[o.status]}
                        <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">
                            ${o.status === 'pending' ? `<button class="btn-primary" style="width:auto;padding:6px 12px;font-size:12px;" onclick="updateOrderStatus(${o.id},'confirmed')">✅ Подтвердить</button>` : ''}
                            ${o.status === 'confirmed' ? `<button class="btn-primary" style="width:auto;padding:6px 12px;font-size:12px;" onclick="updateOrderStatus(${o.id},'completed')">🎉 Выполнен</button>` : ''}
                            ${o.status === 'pending' ? `<button class="btn-danger" style="width:auto;padding:6px 12px;font-size:12px;" onclick="updateOrderStatus(${o.id},'cancelled')">❌ Отменить</button>` : ''}
                            <button class="btn-secondary" style="width:auto;padding:6px 12px;font-size:12px;" onclick="toggleOrderEdit(${o.id})">✏️ ${o.can_edit ? 'Запретить отмену' : 'Разрешить отмену'}</button>
                        </div>
                    </div>`;
                });
            }

            // Управление категориями
            html += `<h4 style="margin:16px 0 8px;">📂 Категории</h4>`;
            html += `<div style="display:flex;gap:6px;margin-bottom:8px;"><input type="text" id="newCatName" class="search-input" placeholder="Новая категория" style="flex:1;"><button class="btn-primary" style="width:auto;padding:10px 16px;" onclick="addCategory()">+</button></div>`;
            categories.forEach(c => {
                html += `<div class="option-card" style="justify-content:space-between;">
                    <span>${c.name} ${c.is_active ? '✅' : '❌'}</span>
                    <div style="display:flex;gap:6px;">
                        <button class="qty-btn" onclick="toggleCategory(${c.id})">${c.is_active ? '👁' : '👁‍🗨'}</button>
                        <button class="qty-btn" style="background:#ef4444;" onclick="deleteCategory(${c.id})">✕</button>
                    </div>
                </div>`;
            });

            // Добавление товара
            html += `<h4 style="margin:16px 0 8px;">📦 Добавить товар</h4>`;
            html += `
                <input type="text" id="prodName" class="search-input" placeholder="Название" style="margin-bottom:6px;">
                <input type="text" id="prodDesc" class="search-input" placeholder="Описание" style="margin-bottom:6px;">
                <input type="number" id="prodPrice" class="search-input" placeholder="Цена" style="margin-bottom:6px;">
                <input type="number" id="prodStock" class="search-input" placeholder="Количество" style="margin-bottom:6px;">
                <select id="prodCat" class="search-input" style="margin-bottom:6px;">
                    ${categories.filter(c=>c.is_active).map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
                </select>
                <button class="btn-primary" onclick="addProduct()">➕ Добавить товар</button>
            `;

            // Управление метро
            html += `<h4 style="margin:16px 0 8px;">🚇 Станции метро</h4>`;
            const lines = {};
            metroStations.forEach(m => {
                if (!lines[m.line]) lines[m.line] = [];
                lines[m.line].push(m);
            });
            for (const [line, stations] of Object.entries(lines)) {
                html += `<p style="font-weight:600;margin:8px 0 4px;color:${stations[0].color};">● ${line}</p>`;
                stations.forEach(s => {
                    html += `<div class="option-card" style="justify-content:space-between;">
                        <span>🚇 ${s.station} ${s.is_available !== false ? '✅' : '❌'}</span>
                        <button class="qty-btn" onclick="toggleMetro('${s.station}')">Перекл</button>
                    </div>`;
                });
            }

            // Управление временем
            html += `<h4 style="margin:16px 0 8px;">🕐 Временные слоты</h4>`;
            timeSlots.forEach(t => {
                html += `<div class="option-card" style="justify-content:space-between;">
                    <span>🕐 ${t.time_range} ${t.is_available !== false ? '✅' : '❌'}</span>
                    <button class="qty-btn" onclick="toggleTimeSlot(${t.id})">Перекл</button>
                </div>`;
            });

            area.innerHTML = html;
        }

        function updateOrderStatus(id, status) {
            const o = orders.find(x => x.id === id);
            if (o) { o.status = status; saveData(); showToast(`Заказ #${id.toString().slice(-6)}: ${status}`); renderContent(); }
        }
        function toggleOrderEdit(id) {
            const o = orders.find(x => x.id === id);
            if (o) { o.can_edit = !o.can_edit; saveData(); renderContent(); }
        }
        function addCategory() {
            const name = document.getElementById('newCatName')?.value?.trim();
            if (name) {
                categories.push({id:Date.now(), name, is_active:true});
                saveData(); renderContent(); showToast('Категория добавлена');
            }
        }
        function toggleCategory(id) {
            const c = categories.find(x => x.id === id);
            if (c) { c.is_active = !c.is_active; saveData(); renderContent(); }
        }
        function deleteCategory(id) {
            categories = categories.filter(x => x.id !== id);
            saveData(); renderContent(); showToast('Категория удалена');
        }
        function addProduct() {
            const name = document.getElementById('prodName')?.value?.trim();
            const desc = document.getElementById('prodDesc')?.value?.trim();
            const price = parseFloat(document.getElementById('prodPrice')?.value || 0);
            const stock = parseInt(document.getElementById('prodStock')?.value || 0);
            const catId = parseInt(document.getElementById('prodCat')?.value || 0);
            if (name && price > 0) {
                products.push({id:Date.now(), name, description:desc, price, stock_quantity:stock, category_id:catId, is_available:true, image:'📦'});
                saveData(); renderContent(); showToast('Товар добавлен');
            }
        }
        function toggleMetro(stationName) {
            metroStations.forEach(m => {
                if (m.station === stationName) m.is_available = m.is_available === false ? true : false;
            });
            saveData(); renderContent();
        }
        function toggleTimeSlot(id) {
            const t = timeSlots.find(x => x.id === id);
            if (t) { t.is_available = t.is_available === false ? true : false; saveData(); renderContent(); }
        }

        // ============ MODAL ============
        function openModal(html) {
            document.getElementById('modalBox').innerHTML = html;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

        function showToast(text) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = text;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        // ============ INIT ============
        loadData();
        checkAdmin();
        renderContent();
        console.log('Helgirll Test запущен');
    </script>
</body>
</html>
