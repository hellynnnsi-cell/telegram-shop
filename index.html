<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>⚡ TechShop</title>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #0a0a0f);
            --tg-text: var(--tg-theme-text-color, #fafafa);
            --tg-hint: var(--tg-theme-hint-color, #a1a1aa);
            --tg-link: var(--tg-theme-link-color, #a855f7);
            --tg-button: var(--tg-theme-button-color, #7c3aed);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary: var(--tg-theme-secondary-bg-color, #13131a);

            --bg: #0a0a0f;
            --card: #13131a;
            --card2: #1a1a24;
            --accent: #7c3aed;
            --accent2: #a855f7;
            --pink: #ec4899;
            --text: #fafafa;
            --text2: #a1a1aa;
            --green: #22c55e;
            --red: #ef4444;
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.06);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(124,58,237,0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(236,72,153,0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.02) 0%, transparent 70%);
            animation: bgFloat 30s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, -1%) rotate(0.5deg); }
            50% { transform: translate(-1%, 2%) rotate(-0.5deg); }
            75% { transform: translate(-2%, -0.5%) rotate(0.3deg); }
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 12px 14px 120px;
        }

        /* ----- HEADER ----- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10,10,15,0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent2), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            position: relative;
            transition: all 0.2s;
            color: var(--text);
        }

        .icon-btn:active {
            transform: scale(0.9);
            background: var(--card2);
        }

        .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--accent);
            color: white;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            box-shadow: 0 2px 8px rgba(124,58,237,0.5);
        }

        /* ----- SEARCH ----- */
        .search-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .search-input {
            flex: 1;
            padding: 13px 16px;
            border-radius: var(--radius);
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(124,58,237,0.1);
        }

        .search-input::placeholder {
            color: #52525b;
        }

        .search-btn {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .search-btn:active {
            transform: scale(0.9);
            opacity: 0.85;
        }

        /* ----- CATEGORIES ----- */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 0 14px;
            margin-bottom: 6px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .chip {
            padding: 9px 17px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            color: var(--text2);
            flex-shrink: 0;
        }

        .chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(124,58,237,0.35);
        }

        /* ----- PRODUCT GRID ----- */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 11px;
        }

        .product-card {
            background: var(--card);
            border-radius: 18px;
            padding: 13px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .product-card:active {
            transform: scale(0.95);
            background: var(--card2);
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(145deg, #1e1e2e 0%, #16162a 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 10px;
            position: relative;
        }

        .badge-new {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 3px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-desc {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .product-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent2);
        }

        .btn-add {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-add:active {
            transform: scale(0.85);
        }

        .btn-add.in-cart {
            background: var(--green);
        }

        /* ----- MODAL ----- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--card);
            border-radius: 22px 22px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            padding: 24px 18px 18px;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 36px;
            height: 5px;
            background: #3a3a45;
            border-radius: 3px;
            margin: 0 auto 16px;
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #25252f;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-title {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* ----- CART ITEM ----- */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card2);
            border-radius: 14px;
            margin-bottom: 8px;
        }

        .cart-img {
            width: 46px;
            height: 46px;
            border-radius: 11px;
            background: #1e1e2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .cart-info {
            flex: 1;
            min-width: 0;
        }

        .cart-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-price {
            font-size: 12px;
            color: var(--accent2);
        }

        .qty-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: #2a2a35;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:active {
            background: #3a3a45;
        }

        .qty-val {
            font-weight: 700;
            width: 18px;
            text-align: center;
            font-size: 14px;
        }

        /* ----- BUTTONS ----- */
        .btn-primary {
            width: 100%;
            padding: 15px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            letter-spacing: -0.2px;
        }

        .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.85;
        }

        .btn-secondary {
            width: 100%;
            padding: 13px;
            border-radius: var(--radius);
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-secondary:active {
            background: #252535;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-top: 1px solid #1e1e2e;
            margin-top: 8px;
        }

        .total-label {
            font-size: 15px;
            color: var(--text2);
        }

        .total-val {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent2), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ----- STATES ----- */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
            grid-column: 1 / -1;
        }

        .empty-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        /* ----- CHECKOUT ----- */
        .option-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--card2);
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-card:active {
            background: #252535;
        }

        .option-arrow {
            color: var(--accent2);
            margin-left: auto;
            font-size: 18px;
        }

        .confirm-box {
            background: var(--card2);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 12px;
            line-height: 1.9;
            font-size: 14px;
        }

        /* ----- REVIEW STARS ----- */
        .stars-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }

        .star-btn {
            font-size: 36px;
            cursor: pointer;
            transition: transform 0.15s;
            filter: grayscale(1);
        }

        .star-btn.active {
            filter: grayscale(0);
            transform: scale(1.1);
        }

        .star-btn:active {
            transform: scale(1.3);
        }

        /* ----- TABS ----- */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--card2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 14px;
        }

        .tab {
            flex: 1;
            padding: 9px;
            border-radius: 9px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text2);
            font-weight: 500;
        }

        .tab.active {
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        /* ----- TOAST ----- */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--green);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            animation: toastIn 0.3s ease-out, toastOut 0.3s 1.7s ease-in forwards;
            box-shadow: 0 8px 24px rgba(34,197,94,0.3);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">⚡ TechShop</div>
            <div class="header-actions">
                <div class="icon-btn" onclick="showCart()" id="cartBtn">
                    🛒
                    <span class="badge" id="cartBadge">0</span>
                </div>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-wrap">
            <input type="text" class="search-input" placeholder="🔍 Поиск товаров..." id="searchInput" oninput="onSearch()">
        </div>

        <!-- CATEGORIES -->
        <div class="categories" id="catList"></div>

        <!-- PRODUCTS -->
        <div class="products-grid" id="productGrid"></div>
    </div>

    <!-- TOAST -->
    <div id="toastContainer"></div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
        <div class="modal" id="modalBox"></div>
    </div>

    <script>
        // ============ TELEGRAM INIT ============
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.MainButton.hide();
        tg.enableClosingConfirmation();

        // ============ ДАННЫЕ ============
        const products = [
            { id: 1, name: 'iPhone 15 Pro Max', cat: 'Телефоны', price: 149990, img: '📱', desc: 'A17 Pro · Титановый корпус · 256 ГБ', rating: 4.9, reviews: 567, stock: 10 },
            { id: 2, name: 'Samsung S24 Ultra', cat: 'Телефоны', price: 129990, img: '📲', desc: 'Galaxy AI · 200 МП · S Pen · 512 ГБ', rating: 4.8, reviews: 423, stock: 15 },
            { id: 3, name: 'MacBook Air 15" M3', cat: 'Ноутбуки', price: 159990, img: '💻', desc: 'M3 · 16 ГБ ОЗУ · 512 ГБ SSD', rating: 4.9, reviews: 312, stock: 8 },
            { id: 4, name: 'MacBook Pro 14" M3 Pro', cat: 'Ноутбуки', price: 229990, img: '💻', desc: 'M3 Pro · 36 ГБ · 1 ТБ · Чёрный', rating: 4.9, reviews: 278, stock: 5 },
            { id: 5, name: 'AirPods Pro 2 USB-C', cat: 'Наушники', price: 32990, img: '🎧', desc: 'Активный шумодав · MagSafe', rating: 4.8, reviews: 891, stock: 20 },
            { id: 6, name: 'Sony WH-1000XM5', cat: 'Наушники', price: 37990, img: '🎧', desc: 'Лучший шумодав · 30 ч работы', rating: 4.7, reviews: 445, stock: 12 },
            { id: 7, name: 'PlayStation 5 Slim', cat: 'Игры', price: 64990, img: '🎮', desc: '1 ТБ SSD · DualSense · Белая', rating: 4.9, reviews: 1200, stock: 7 },
            { id: 8, name: 'Nintendo Switch OLED', cat: 'Игры', price: 32990, img: '🕹️', desc: '7" OLED · Портативная · 64 ГБ', rating: 4.7, reviews: 678, stock: 10 },
            { id: 9, name: 'iPad Pro M4 11"', cat: 'Планшеты', price: 119990, img: '📋', desc: 'M4 · Ultra Retina XDR · 256 ГБ', rating: 4.8, reviews: 234, stock: 6 },
            { id: 10, name: 'Apple Watch Ultra 2', cat: 'Часы', price: 89990, img: '⌚', desc: 'Титан · 49 мм · Дайвинг · GPS', rating: 4.8, reviews: 345, stock: 9 },
            { id: 11, name: 'Dyson V15 Detect', cat: 'Техника', price: 79990, img: '🧹', desc: 'Лазер · Авто-режим · 60 мин', rating: 4.6, reviews: 167, stock: 4 },
            { id: 12, name: 'Xiaomi Robot S20', cat: 'Техника', price: 39990, img: '🤖', desc: 'Лидар · Влажная уборка · Wi-Fi', rating: 4.5, reviews: 432, stock: 11 },
        ];

        const categories = ['Все', 'Телефоны', 'Ноутбуки', 'Наушники', 'Игры', 'Планшеты', 'Часы', 'Техника'];

        const metroLines = [
            {
                name: '🔴 Красная ветка',
                stations: ['Спортивная', 'Площадь Ленина', 'Заельцовская', 'Красный проспект', 'Гагаринская']
            },
            {
                name: '🟢 Зелёная ветка',
                stations: ['Парк культуры', 'Октябрьская', 'Речной вокзал', 'Студенческая', 'Площадь Маркса']
            },
            {
                name: '🔵 Синяя ветка',
                stations: ['Площадь Калинина', 'Берёзовая роща', 'Золотая Нива']
            },
        ];

        const timeSlots = [
            '10:00 – 12:00',
            '12:00 – 14:00',
            '14:00 – 16:00',
            '16:00 – 18:00',
            '18:00 – 20:00',
        ];

        // ============ СОСТОЯНИЕ ============
        let cart = [];
        let selectedCat = 'Все';
        let searchQ = '';
        let checkoutMetro = '';
        let checkoutTime = '';
        let currentTab = 'cart'; // 'cart' | 'orders' | 'reviews'

        // Загружаем корзину из localStorage
        try {
            const saved = localStorage.getItem('tg_shop_cart');
            if (saved) cart = JSON.parse(saved);
        } catch(e) {}

        function saveCart() {
            try { localStorage.setItem('tg_shop_cart', JSON.stringify(cart)); } catch(e) {}
        }

        // ============ РЕНДЕР ============
        function renderCats() {
            document.getElementById('catList').innerHTML = categories.map(c =>
                `<div class="chip${c === selectedCat ? ' active' : ''}" onclick="pickCat('${c}')">${c}</div>`
            ).join('');
        }

        function renderProducts() {
            let list = products;
            if (selectedCat !== 'Все') list = list.filter(p => p.cat === selectedCat);
            if (searchQ) {
                const q = searchQ.toLowerCase();
                list = list.filter(p =>
                    p.name.toLowerCase().includes(q) ||
                    p.desc.toLowerCase().includes(q) ||
                    p.cat.toLowerCase().includes(q)
                );
            }

            const grid = document.getElementById('productGrid');
            if (!list.length) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Ничего не найдено</p><p style="font-size:12px;">Попробуйте изменить запрос</p></div>`;
                return;
            }

            grid.innerHTML = list.map(p => {
                const inCart = cart.find(c => c.id === p.id);
                const stockBadge = p.stock <= 3 ? `<span class="badge-new" style="background:#ef4444;">${p.stock} шт.</span>` : '';

                return `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <div class="product-img">
                        ${p.img}
                        ${p.stock > 3 ? '<span class="badge-new">NEW</span>' : stockBadge}
                    </div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-rating">⭐ ${p.rating} · ${p.reviews} отз.</div>
                    <div class="product-bottom">
                        <span class="price">${p.price.toLocaleString('ru-RU')} ₽</span>
                        <button class="btn-add${inCart ? ' in-cart' : ''}" onclick="event.stopPropagation(); addCart(${p.id})">
                            ${inCart ? '✓' : '+'}
                        </button>
                    </div>
                </div>`;
            }).join('');

            updateBadge();
        }

        function updateBadge() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartBadge').textContent = count;
        }

        // ============ ДЕЙСТВИЯ ============
        function pickCat(cat) {
            selectedCat = cat;
            renderCats();
            renderProducts();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function onSearch() {
            searchQ = document.getElementById('searchInput').value;
            renderProducts();
        }

        function addCart(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;

            const ex = cart.find(x => x.id === id);
            if (ex) {
                if (ex.qty < p.stock) ex.qty++;
            } else {
                cart.push({ ...p, qty: 1 });
            }

            saveCart();
            renderProducts();
            showToast(`${p.name} добавлен в корзину`);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function showToast(text) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = text;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        // ============ МОДАЛКИ ============
        function openModal(html) {
            document.getElementById('modalBox').innerHTML = html;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = '';
            currentTab = 'cart';
        }

        function closeModalOutside(e) {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        }

        // --- Товар ---
        function openProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;

            const inCart = cart.find(x => x.id === id);
            const cartQty = inCart ? inCart.qty : 0;

            openModal(`
                <div class="modal-handle"></div>
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div style="text-align:center;font-size:80px;margin:12px 0;">${p.img}</div>
                <h2 style="font-size:20px;margin-bottom:4px;">${p.name}</h2>
                <p style="color:#a1a1aa;margin-bottom:12px;">${p.desc}</p>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
                    <span style="background:#1e1e2e;padding:6px 12px;border-radius:8px;font-size:12px;">⭐ ${p.rating}</span>
                    <span style="background:#1e1e2e;padding:6px 12px;border-radius:8px;font-size:12px;">📝 ${p.reviews} отзывов</span>
                    <span style="background:${p.stock > 3 ? '#1e1e2e' : '#3b1111'};padding:6px 12px;border-radius:8px;font-size:12px;">📦 ${p.stock > 0 ? p.stock + ' шт.' : 'Нет в наличии'}</span>
                </div>
                <div style="font-size:26px;font-weight:800;color:#a855f7;margin-bottom:16px;">${p.price.toLocaleString('ru-RU')} ₽</div>
                ${p.stock > 0 ? `
                    <button class="btn-primary" onclick="addCart(${p.id});closeModal();">
                        🛒 Добавить в корзину ${cartQty > 0 ? '(' + cartQty + ')' : ''}
                    </button>
                ` : `
                    <button class="btn-primary" style="background:#3a3a3a;cursor:not-allowed;" disabled>
                        ⏳ Нет в наличии
                    </button>
                `}
            `);
        }

        // --- Корзина ---
        function showCart() {
            currentTab = 'cart';
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let html = `
                <div class="modal-handle"></div>
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">🛒 Корзина</div>`;

            if (!cart.length) {
                html += `<div class="empty-state"><div class="empty-icon">🛒</div><p>Корзина пуста</p><p style="font-size:12px;">Добавьте товары из каталога</p></div>`;
            } else {
                html += cart.map(i => `
                    <div class="cart-item">
                        <div class="cart-img">${i.img}</div>
                        <div class="cart-info">
                            <div class="cart-name">${i.name}</div>
                            <div class="cart-price">${(i.price * i.qty).toLocaleString('ru-RU')} ₽</div>
                        </div>
                        <div class="qty-group">
                            <button class="qty-btn" onclick="chQty(${i.id}, -1)">−</button>
                            <span class="qty-val">${i.qty}</span>
                            <button class="qty-btn" onclick="chQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('');

                html += `
                    <div class="total-row">
                        <span class="total-label">Итого:</span>
                        <span class="total-val">${total.toLocaleString('ru-RU')} ₽</span>
                    </div>
                    <button class="btn-primary" onclick="stepMetro()">📋 Оформить заказ</button>
                    <button class="btn-secondary" onclick="cart=[];saveCart();closeModal();renderProducts();showToast('Корзина очищена')">🗑 Очистить корзину</button>
                `;
            }

            openModal(html);
        }

        function chQty(id, delta) {
            const item = cart.find(x => x.id === id);
            if (!item) return;

            item.qty += delta;
            if (item.qty <= 0) {
                cart = cart.filter(x => x.id !== id);
            }
            if (item.qty > item.stock) item.qty = item.stock;

            saveCart();
            showCart();
            renderProducts();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // --- Оформление ---
        function stepMetro() {
            if (!cart.length) { showToast('Корзина пуста'); return; }

            let html = `
                <div class="modal-handle"></div>
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">📍 Выберите станцию метро</div>
                <p style="color:#a1a1aa;margin-bottom:10px;font-size:13px;">Для самовывоза</p>`;

            metroLines.forEach(line => {
                html += `<p style="color:#a855f7;font-weight:600;margin:10px 0 6px;font-size:14px;">${line.name}</p>`;
                line.stations.forEach(s => {
                    html += `
                        <div class="option-card" onclick="pickMetro('${s}')">
                            <span style="font-size:18px;">🚇</span>
                            <span>${s}</span>
                            <span class="option-arrow">→</span>
                        </div>`;
                });
            });

            html += `<button class="btn-secondary" onclick="showCart()">← Назад в корзину</button>`;
            openModal(html);
        }

        function pickMetro(station) {
            checkoutMetro = station;
            const d = new Date();
            d.setDate(d.getDate() + 1);
            const dateStr = d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' });

            let html = `
                <div class="modal-handle"></div>
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">🕐 Выберите время</div>
                <p style="color:#a1a1aa;margin-bottom:12px;font-size:13px;">📍 ${station} · 📅 ${dateStr}</p>`;

            timeSlots.forEach(t => {
                html += `
                    <div class="option-card" onclick="pickTime('${t}')">
                        <span style="font-size:18px;">🕐</span>
                        <span>${t}</span>
                        <span class="option-arrow">→</span>
                    </div>`;
            });

            html += `<button class="btn-secondary" onclick="stepMetro()">← Изменить метро</button>`;
            openModal(html);
        }

        function pickTime(time) {
            checkoutTime = time;
            const d = new Date();
            d.setDate(d.getDate() + 1);
            const dateStr = d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' });
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const count = cart.reduce((s, i) => s + i.qty, 0);

            // Список товаров
            const itemsList = cart.map(i =>
                `<div style="display:flex;justify-content:space-between;font-size:13px;">
                    <span>${i.name} x${i.qty}</span>
                    <span>${(i.price * i.qty).toLocaleString('ru-RU')} ₽</span>
                </div>`
            ).join('');

            openModal(`
                <div class="modal-handle"></div>
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">✅ Подтверждение заказа</div>
                <div class="confirm-box">
                    <p style="margin-bottom:6px;">📍 <b>Метро:</b> ${checkoutMetro}</p>
                    <p style="margin-bottom:6px;">📅 <b>Дата:</b> ${dateStr}</p>
                    <p style="margin-bottom:6px;">🕐 <b>Время:</b> ${checkoutTime}</p>
                    <p style="margin-bottom:10px;">📦 <b>Товаров:</b> ${count} шт.</p>
                    <div style="border-top:1px solid #2a2a35;padding-top:10px;margin-bottom:8px;">${itemsList}</div>
                    <p style="font-size:18px;font-weight:700;color:#a855f7;">💰 ${total.toLocaleString('ru-RU')} ₽</p>
                </div>
                <button class="btn-primary" onclick="sendOrder()">✅ Подтвердить заказ</button>
                <button class="btn-secondary" onclick="pickMetro('${checkoutMetro}')">← Изменить время</button>
            `);
        }

        function sendOrder() {
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

            tg.sendData(JSON.stringify({
                action: 'new_order',
                items: cart.map(i => ({
                    id: i.id,
                    name: i.name,
                    price: i.price,
                    qty: i.qty
                })),
                total: total,
                metro: checkoutMetro,
                time: checkoutTime,
            }));

            cart = [];
            saveCart();
            tg.close();
        }

        // ============ СТАРТ ============
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') onSearch();
        });

        // Поддержка тёмной темы Telegram
        tg.onEvent('themeChanged', function() {
            document.documentElement.style.setProperty('--tg-bg', tg.themeParams.bg_color || '#0a0a0f');
            document.documentElement.style.setProperty('--tg-text', tg.themeParams.text_color || '#fafafa');
        });

        renderCats();
        renderProducts();
        console.log('🚀 TechShop Web App готов');
    </script>
</body>
</html>
